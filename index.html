<!DOCTYPE html>

    <style>
        body {
            background-color: rgb(255, 0, 76);
            font-family: sans-serif;
        }

        h1, h2 {
            color: white;
            text-align: center;
        }

        .gallery {
            display: flex;
            flex-wrap: wrap;
            gap: 25px;
            justify-content: center;
            padding: 30px;
        }

        /* სურათის და ტექსტის ერთიანი ყუთი */
        .item {
            text-align: center;
            color: rgb(0, 0, 0);
        }

        .item img {
            width: 300px;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
            transition: all 0.3s ease;
            display: block;
        }

        .item img:hover {
            transform: scale(1.05) translateY(-10px);
            box-shadow: 0 15px 30px rgba(0,0,0,0.4);
            cursor: pointer;
        }

        .item p {
            margin-top: 10px;
            font-size: 18px;
            font-weight: bold;
        }

    text-align: center;

}
